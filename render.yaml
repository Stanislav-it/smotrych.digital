services:
  - type: web
    name: smotrych-digital
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SITE_URL
        value: https://smotrych.digital
      - key: GTM_ID
        sync: false
      - key: GA4_MEASUREMENT_ID
        sync: false
